<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><style>
  html, body { margin: 0; }
  .tile {
    width: 440px; height: 280px; box-sizing: border-box;
    background: linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #fff; text-align: center;
  }
  .tile img { width: 88px; height: 88px; border-radius: 19px; box-shadow: 0 14px 34px rgba(0,0,0,.32); }
  .tile h1 { margin: 0; font-size: 36px; font-weight: 760; letter-spacing: -.5px; }
  .tile p { margin: 0; font-size: 15px; font-weight: 500; opacity: .92; }
</style></head><body>
  <div class="tile">
    <img src="../icons/icon128.png" alt="">
    <h1>Meowdo</h1>
    <p>Your to-dos, one click away</p>
  </div>
</body></html>
